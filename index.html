<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="관심종목">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>📊 관심종목 모닝 브리프</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}
.container {
  max-width: 820px;
  width: 100%;
}
.header {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  text-align: center;
  padding: 28px 24px 22px;
  margin-bottom: 16px;
}
.header h1 { font-size: 24px; font-weight: 800; color: #111827; letter-spacing: -0.5px; }
.header p { font-size: 13px; color: #6b7280; margin-top: 6px; }
.tags {
  display: flex; flex-wrap: wrap; gap: 5px;
  justify-content: center; margin-top: 14px;
}
.tag {
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; font-weight: 500;
}
.tag.sector-ship { color: #1d4ed8; border: 1px solid #bfdbfe; background: #eff6ff; }
.tag.sector-semi { color: #15803d; border: 1px solid #bbf7d0; background: #f0fdf4; }
.tag.sector-game { color: #7c3aed; border: 1px solid #ddd6fe; background: #f5f3ff; }
.tag.sector-etc  { color: #b45309; border: 1px solid #fde68a; background: #fffbeb; }

.list { margin-top: 4px; }
.item {
  display: flex; align-items: center;
  justify-content: space-between;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 16px 20px;
  margin-bottom: 10px; text-decoration: none;
  color: inherit; transition: box-shadow 0.15s, border-color 0.15s;
  cursor: pointer;
}
.item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); border-color: #93c5fd; }
.item.is-new { border-left: 3px solid #dc2626; }
.item-date { font-size: 15px; font-weight: 700; color: #111827; }
.item-sub { font-size: 12px; color: #6b7280; margin-top: 4px; max-width: 580px; }
.badge-new {
  background: #dc2626; color: #fff;
  font-size: 10px; font-weight: 800;
  padding: 2px 8px; border-radius: 4px;
  white-space: nowrap;
}
.badge-link {
  color: #2563eb; font-size: 12px;
  font-weight: 600; white-space: nowrap;
}
.empty {
  text-align: center; color: #9ca3af;
  padding: 60px 20px; font-size: 14px;
  background: #fff; border-radius: 10px;
  border: 1px solid #e5e7eb;
}
.footer {
  text-align: center; margin-top: 24px;
  font-size: 11px; color: #9ca3af;
}

@media (max-width: 600px) {
  body { padding: 20px 12px; }
  .item { flex-direction: column; align-items: flex-start; gap: 10px; }
  .item-sub { max-width: 100%; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📊 관심종목 모닝 브리프</h1>
    <p>매일 오전 6시 — 뉴스 크롤링 & 섹터 이슈 요약 (출처 링크 필수)</p>
    <div class="tags">
      <span class="tag sector-ship">⚓ 대한조선</span>
      <span class="tag sector-ship">⚓ 삼성중공업</span>
      <span class="tag sector-ship">⚓ HD한국조선해양</span>
      <span class="tag sector-semi">🔬 SK하이닉스</span>
      <span class="tag sector-semi">🔬 삼성전자</span>
      <span class="tag sector-semi">🔬 파두</span>
      <span class="tag sector-semi">🔬 제주반도체</span>
      <span class="tag sector-game">🎮 크래프톤</span>
      <span class="tag sector-game">🎮 네오위즈</span>
      <span class="tag sector-game">🎮 시프트업</span>
      <span class="tag sector-etc">🚀 한화엔진</span>
      <span class="tag sector-etc">🚗 DN오토모티브</span>
      <span class="tag sector-etc">💊 메지온</span>
    </div>
  </div>

  <div class="list" id="list">
    <div class="empty">브리핑 목록을 불러오는 중...</div>
  </div>

  <div class="footer">
    ⚠️ 자동 생성 브리핑 — 투자 권유가 아닙니다 &nbsp;|&nbsp; 모든 뉴스는 원문 출처 링크 포함
  </div>

</div>
<script>
const DAYS = ['일','월','화','수','목','금','토'];

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  const y = dt.getFullYear(), m = dt.getMonth()+1, day = dt.getDate();
  return `${y}년 ${m}월 ${day}일 (${DAYS[dt.getDay()]})`;
}

async function load() {
  const el = document.getElementById('list');
  try {
    const r = await fetch('briefings/manifest.json?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    const items = (data.briefings || []).sort((a,b) => b.date.localeCompare(a.date));

    if (!items.length) {
      el.innerHTML = '<div class="empty">아직 생성된 브리핑이 없습니다.<br>내일 오전 6시 첫 브리핑이 발행됩니다.</div>';
      return;
    }

    const today = new Date().toISOString().slice(0,10);
    el.innerHTML = items.map((item, i) => {
      const isNew = item.date === today || i === 0;
      return `
        <a class="item${isNew ? ' is-new' : ''}" href="briefings/watchlist-brief-${item.date}.html">
          <div>
            <div class="item-date">${fmtDate(item.date)}</div>
            ${item.headline ? `<div class="item-sub">${item.headline}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
            ${isNew ? '<span class="badge-new">NEW</span>' : ''}
            <span class="badge-link">브리핑 보기 →</span>
          </div>
        </a>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">목록을 불러오지 못했습니다.</div>';
  }
}
load();
</script>
</body>
</html>
